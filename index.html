<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>barbearia - agendamento</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Agende seu horário</h1>

    
    <h2>Escolha o servico</h2>
    <select id="servico">
      <option value="30">corte - 30reais</option>
      <option value="20">barba - 20reais</option>
      <option value="45">combo (corte + barba) - 35reais</option>
    </select>

    
    <h2>Escolha a data</h2>
    <input type="date" id="data">

    
    <h2>Escolha o horário</h2>
    <input type="time" id="hora">

    
    <h2>Total</h2>
    <p id="Total">R$ 0</p>

    <p id="sinal">Sinal: R$ 0</p>

    
    <button onclick="agendar()">confirmar agendamento</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
